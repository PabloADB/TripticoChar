<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tríptico Electrónico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="triptico-voltear-container">
      <div class="triptico-frontal">
          <div class="triptico-deslizante-container slide-1">
              <div class="panel panel-1">
                  <img src="IMG_TRIP/T1.jpeg" alt="Imagen del Panel 1">
              </div>
              <div class="panel panel-2">
                  <img src="IMG_TRIP/T2.jpeg" alt="Imagen del Panel 2">
              </div>
              <div class="panel panel-3">
                 <img src="IMG_TRIP/T3.jpeg" alt="Imagen del Panel 3">
              </div>
          </div>
          <div class="botones-deslizamiento">
              <button class="btn" data-target="1">1</button>
              <button class="btn" data-target="2">2</button>
              <button class="btn" data-target="3">3</button>
          </div>
      </div>
      <div class="triptico-trasero">
          <div class="triptico-deslizante-container slide-4">
              <div class="panel panel-4">
                  <img src="IMG_TRIP/TT1.jpeg" alt="Imagen del Panel 4">
              </div>
              <div class="panel panel-5">
                  <img src="IMG_TRIP/TT2.jpeg" alt="Imagen del Panel 5">
              </div>
              <div class="panel panel-6">
                <img src="IMG_TRIP/TT3.jpeg" alt="Imagen del Panel 6">
              </div>
          </div>
          <div class="botones-deslizamiento">
              <button class="btn" data-target="4">4</button>
              <button class="btn" data-target="5">5</button>
              <button class="btn" data-target="6">6</button>
          </div>
      </div>
  </div>

  <div class="botones-voltear">
      <button class="btn-voltear btn">Voltear</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
